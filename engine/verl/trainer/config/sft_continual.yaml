# SFT baseline for the SDPO sequential continual-learning sweep.
#
# Wraps verl.trainer.fsdp_sft_trainer (sft_trainer.yaml) with the same hyperparameters used by
# sdft.yaml / sdpo.yaml / baseline_grpo.yaml so cross-method comparison has zero confound:
#   - lr 1e-5, cosine, warmup_ratio 0.1, weight_decay 0.01, clip_grad 1.0
#   - 2 epochs over per-task train data, train_batch 32 (run_sequential.py overrides total_steps)
#   - 8-GPU FSDP, max_length 2048 (overridable via --sft-max-length)
#
# Differences from sft_trainer.yaml:
#   - multiturn enabled (we feed [system,user,assistant] messages from stage_sft_messages())
#   - save_contents includes hf_model so the next task can use model.partial_pretrain
#   - test_freq=-1 (loss-based val is not used in this sweep; rollout-based val happens in a
#     separate eval-only main_ppo pass between tasks, see launch_eval_only_block)

defaults:
  - sft_trainer
  - _self_

data:
  train_batch_size: 32
  micro_batch_size: null
  micro_batch_size_per_gpu: 4   # 32 batch / 8 GPUs
  max_length: 2048
  truncation: right             # finqa contexts can exceed 2048; left-truncating drops the question
  multiturn:
    enable: true
    messages_key: messages

model:
  partial_pretrain: Qwen/Qwen3-8B   # overridden per-task by run_sequential.py
  enable_gradient_checkpointing: true
  strategy: fsdp2
  trust_remote_code: false

optim:
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01
  lr_warmup_steps_ratio: 0.1
  clip_grad: 1.0
  lr_scheduler: cosine

ulysses_sequence_parallel_size: 1
use_remove_padding: false

trainer:
  project_name: sdpo_seq
  total_epochs: 2
  total_training_steps: null    # set by run_sequential.py
  test_freq: -1                 # skip loss-based val during training
  save_freq: -1                 # save once at end via is_last_step
  n_gpus_per_node: 8
  nnodes: 1
  resume_mode: disable
  checkpoint:
    save_contents: ["model", "hf_model", "extra"]
    load_contents: ["model"]
  logger: ["console", "file"]
