lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  warmup_ratio: 0.05
  bf16: true
  logging_steps: 10
  gradient_checkpointing: true
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.95
  top_k: 20

generation:
  max_new_tokens: 8192
  temperature: 0.0
  do_sample: false
  eval_batch_size: 32
  enable_thinking: false
