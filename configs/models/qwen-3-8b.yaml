# Qwen 3-8B via OpenRouter
task_lm: "openai/qwen/qwen3-8b"
reflection_lm: "openai/qwen/qwen3-8b"
api_base: "https://openrouter.ai/api/v1"
api_key_env: OPENROUTER_API_KEY
num_threads: 16
eval_num_threads: 16
# Qwen3 thinking mode. Default on.
#   thinking            -- master fallback for both LMs below
#   task_thinking       -- task LM (answers benchmark examples during eval)
#   reflection_thinking -- openevolve mutation/reflection LM (proposes prompts)
# Any per-LM key overrides the shared 'thinking' default.
# thinking: false
# task_thinking: false
# reflection_thinking: false

# OpenEvolve evolution LLM
openevolve_llm:
  api_base: "https://openrouter.ai/api/v1"
  models:
    - name: "qwen/qwen3-8b"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8192
  timeout: 150
  retries: 1
