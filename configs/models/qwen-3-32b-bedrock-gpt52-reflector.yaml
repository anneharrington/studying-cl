# Qwen3-32B task model (AWS Bedrock) with GPT-5.2 as the GEPA reflection LM,
# hitting OpenAI DIRECTLY on a separate API key.
#
# Split-provider setup:
#   task_lm       -> Bedrock Converse -> Qwen3-32B   (AWS_BEARER_TOKEN_BEDROCK)
#   reflection_lm -> litellm -> OpenAI GPT-5.2       (OPENAI_REFLECTOR_API_KEY)
#
# Same pattern as configs/models/qwen-3-8b-portkey-gpt52-reflector.yaml; only
# the task provider differs. GEPA's configure_lms builds the two LMs
# independently (gepa_method.py::_build_lm), and reflection_api_key_env routes
# the reflector at its own key. When reflection_api_key_env is omitted the
# reflector falls back to the task path (original single-provider behaviour).
#
# Required env: AWS_BEARER_TOKEN_BEDROCK + OPENAI_REFLECTOR_API_KEY.
#
# NOTE: this profile is GEPA-only on the model-profile side. ACE consumes the
# reflector-override keys from its `ace:` run-config block (see
# configs/runs/seq_ace_*_bedrock_gpt52reflector.yaml).

task_lm: "bedrock:qwen.qwen3-32b-v1:0"
reflection_lm: "openai/gpt-5.2"

aws_region_name: "us-east-1"

# Task LM auth is via AWS_BEARER_TOKEN_BEDROCK (boto3 picks it up). The
# api_key_env check is skipped for bedrock: routes; the value here is just
# self-documenting.
api_key_env: AWS_BEARER_TOKEN_BEDROCK
# Reflector key — the separate OpenAI key. Resolved independently of api_key_env.
reflection_api_key_env: OPENAI_REFLECTOR_API_KEY
# reflection_api_base intentionally omitted -> litellm uses OpenAI's default.

api_base: ""

num_threads: 8
eval_num_threads: 8

# qwen3 thinking off for the TASK LM (Bedrock).
thinking: false
task_thinking: false

# Leave reflection thinking ON. GPT-5.2 is a reasoning model; injecting
# "/no_think" (what reflection_thinking: false would do) is meaningless and
# only mangles the prompt.
reflection_thinking: true

task_temperature: 0.0
task_max_tokens: 4096

# GPT-5.2 requires temperature == 1 (reasoning models reject other values).
reflection_temperature: 1.0
# Reasoning tokens count against max_tokens; give the reflector generous
# headroom. Bedrock cap doesn't apply here — this LM is direct OpenAI.
reflection_max_tokens: 32000
